            schema:
              type: object
              properties:
                message:
                  type: string
                  maxLength: 2000
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradehubApplication"
        "409":
          description: Already applied
        "500":
          description: Server error

  /tradehub/applications/{id}:
    patch:
      operationId: updateTradehubApplication
      tags: [tradehub]
      summary: Update an application status (accept / reject / reviewed)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [pending, accepted, reviewed, rejected]
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradehubApplication"
        "403":
          description: Not the post owner
        "404":
          description: Not found
        "500":
          description: Server error

  /tradehub/profile/me:
    get:
      operationId: getTradehubProfileMe
      tags: [tradehub]
      summary: Get the current user's TradeHub profile (null if not created)
      responses:
        "200":
          description: My TradeHub profile or null
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradehubProfile"
        "500":
          description: Server error

  /tradehub/profile/{userId}:
    get:
      operationId: getTradehubProfile
      tags: [tradehub]
      summary: Get another user's TradeHub profile
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: TradeHub profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradehubProfile"
        "404":
          description: Not found
        "500":
          description: Server error

  /tradehub/profile:
    put:
      operationId: upsertTradehubProfile
      tags: [tradehub]
      summary: Create or update the current user's TradeHub profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertTradehubProfileBody"
      responses:
        "200":
          description: Saved profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradehubProfile"
        "400":
          description: Validation error
        "500":
          description: Server error

  /tradehub/notifications:
    get:
      operationId: listTradehubNotifications
      tags: [tradehub]
      summary: List TradeHub notifications for the current user
      responses:
        "200":
          description: Notifications list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradehubNotification"
        "500":
          description: Server error

  /tradehub/notifications/read-all:
    post:
      operationId: markAllTradehubNotificationsRead
      tags: [tradehub]
      summary: Mark all TradeHub notifications as read
      responses:
        "200":
          description: Done
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "500":
          description: Server error

  /tradehub/reports:
    post:
      operationId: createTradehubReport
      tags: [tradehub]
      summary: Report a post or user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTradehubReportBody"
      responses:
        "201":
          description: Report submitted
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "500":
          description: Server error

  /tradehub/users/search:
    get:
      operationId: searchTradehubUsers
      tags: [tradehub]
      summary: Search TradeHub users by display name or trade
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
            minLength: 2
      responses:
        "200":
          description: Matching users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradehubUserSearchResult"
        "500":
          description: Server error

  /tradehub/conversations:
    get:
      operationId: listTradehubConversations
      tags: [tradehub]
      summary: List all conversations for the current user
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradehubConversation"
        "500":
          description: Server error
    post:
      operationId: createTradehubConversation
      tags: [tradehub]
      summary: Start a new direct-message conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTradehubConversationBody"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                type: object
                required: [conversationId]
                properties:
                  conversationId:
                    type: integer
        "500":
          description: Server error

  /tradehub/conversations/{id}/messages:
    get:
      operationId: listTradehubMessages
      tags: [tradehub]
      summary: List messages in a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Message list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TradehubMessage"
        "403":
          description: Not a participant
        "500":
          description: Server error
    post:
      operationId: sendTradehubMessage
      tags: [tradehub]
      summary: Send a message in a conversation
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content:
                  type: string
                  minLength: 1
                  maxLength: 5000
      responses:
        "201":
          description: Message sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TradehubMessage"
        "403":
          description: Not a participant
        "500":
          description: Server error

  /tradehub/conversations/{id}/read:
    post:
      operationId: markTradehubConversationRead
      tags: [tradehub]
      summary: Mark all messages in a conversation as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "500":
          description: Server error

  # ── Inspections ────────────────────────────────────────────────────────────

  /inspections:
    get:
      operationId: listInspections
      tags: [inspections]
      summary: List all inspections for the current company
      responses:
        "200":
          description: Inspection rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionRow"
        "500":
          description: Server error
    post:
      operationId: createInspection
      tags: [inspections]
      summary: Create an inspection (optionally submit immediately)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInspectionBody"
      responses:
        "201":
          description: Created inspection
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionRecord"
        "400":
          description: Validation error
        "500":
          description: Server error

  /inspections/{id}:
    get:
      operationId: getInspection
      tags: [inspections]
      summary: Get a single inspection with its checklist items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inspection detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InspectionDetail"
        "404":
          description: Not found
        "500":
          description: Server error

  /inspections/{id}/submit:
    post:
      operationId: submitInspection
      tags: [inspections]
      summary: Submit a draft inspection to trigger AI analysis
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submission started
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "404":
          description: Not found
        "500":
          description: Server error

  /inspection-alerts:
    get:
      operationId: listInspectionAlerts
      tags: [inspections]
      summary: List inspection alerts for the current company
      responses:
        "200":
          description: Alert rows
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InspectionAlertRow"
        "500":
          description: Server error

  /inspection-alerts/{id}/read:
    patch:
      operationId: markInspectionAlertRead
      tags: [inspections]
      summary: Mark a single inspection alert as read
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "404":
          description: Not found
        "500":
          description: Server error

  /inspection-alerts/read-all:
    patch:
      operationId: markAllInspectionAlertsRead
      tags: [inspections]
      summary: Mark all inspection alerts as read for the current company
      responses:
        "200":
          description: Marked all read
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
        "500":
          description: Server error

components:
  parameters:
    companyId:
      name: companyId
      in: path
      required: true
      schema:
        type: integer
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
    reportId:
      name: reportId
      in: path
      required: true
      schema:
        type: integer
    analysisId:
      name: analysisId
      in: path
      required: true
      schema:
        type: integer
    rfiId:
      name: rfiId
      in: path
      required: true
      schema:
        type: integer
    token:
      name: token
      in: path
      required: true
      schema:
        type: string

  schemas:
    ScanRecord:
      type: object
      required: [id, companyId, createdByUserId, objectPath, fileName, sourceType, status, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        createdByUserId:
          type: integer
        projectId:
          type: integer
          nullable: true
        name:
          type: string
          nullable: true
        objectPath:
          type: string
        fileName:
          type: string
        fileSizeBytes:
          type: integer
          nullable: true
        sourceType:
          type: string
          enum: [file, video_capture]
        status:
          type: string
          enum: [ready, processing]
        thumbnailPath:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    CreateScanBody:
      type: object
      required: [objectPath, fileName]
      properties:
        objectPath:
          type: string
        fileName:
          type: string
        fileSizeBytes:
          type: integer
          nullable: true
        sourceType:
          type: string
          enum: [file, video_capture]
        projectId:
          type: integer
          nullable: true
        name:
          type: string
          maxLength: 200
          nullable: true

    UpdateScanBody:
      type: object
      properties:
        name:
          type: string
          maxLength: 200

    ScanUrlResponse:
      type: object
      required: [url, scan]
      properties:
        url:
          type: string
        scan:
          $ref: "#/components/schemas/ScanRecord"

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Project Members ──────────────────────────────────────────────────────
    ProjectMember:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        addedAt:
          type: string
          format: date-time
      required: [id, firstName, lastName, email, role, addedAt]

    ProjectMemberRecord:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: integer
        companyId:
          type: integer
        addedAt:
          type: string
          format: date-time
      required: [id, projectId, userId, companyId, addedAt]

    AddProjectMemberBody:
      type: object
      properties:
        userId:
          type: integer
      required: [userId]

    # ── Users ────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        activeCompanyId:
          type: integer
          nullable: true
        preferredLanguage:
          type: string
          enum: [en, it, pt, es]
          default: en
        systemRole:
          type: string
          nullable: true
          description: "'super_admin' for global admins, null for regular users"
        termsAcceptedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, clerkUserId, email, firstName, lastName, preferredLanguage, createdAt]

    UserMembership:
      type: object
      properties:
        userId:
          type: integer
        companyId:
          type: integer
        role:
          $ref: "#/components/schemas/UserRole"
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
        companyName:
          type: string
          nullable: true
      required: [userId, companyId, role, isActive, createdAt]

    MemberPermissions:
      type: object
      properties:
        viewQuotes:
          type: boolean
        viewTimesheets:
          type: boolean
        viewFinancials:
          type: boolean
        viewDocuments:
          type: boolean
        viewSchedules:
          type: boolean
        viewClientMessages:
          type: boolean
        viewRiskTab:
          type: boolean
        viewSafetyTab:
          type: boolean
        viewInspectTab:
          type: boolean
        manageQuotes:
          type: boolean
        submitExpenses:
          type: boolean
        viewAllProjects:
          type: boolean

    UserWithCompany:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            company:
              $ref: "#/components/schemas/Company"
              nullable: true
            memberships:
              type: array
              items:
                $ref: "#/components/schemas/UserMembership"
            activeCompanyId:
              type: integer
              nullable: true
            role:
              $ref: "#/components/schemas/UserRole"
              description: "Computed from the active (or first available) membership"
            permissions:
              $ref: "#/components/schemas/MemberPermissions"
              description: "Resolved role-based permissions for the active company"   

    UserRole:
      type: string
      enum: [owner, foreman, worker]

    SyncUserBody:
      type: object
      properties:
        clerkUserId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        preferredLanguage:
          type: string
          enum: [en, it, pt, es]
          default: en
      required: [clerkUserId, email, firstName, lastName]

    # ── Companies ────────────────────────────────────────────────────────────
    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        province:
          type: string
        city:
          type: string
        phone:
          type: string
          nullable: true
        logoPath:
          type: string
          nullable: true
        quoteTemplatePath:
          type: string
          nullable: true
        invoiceTemplatePath:
          type: string
          nullable: true
        estimatorConfig:
          type: object
          nullable: true
          properties:
            projectTypeLabels:
              type: object
              additionalProperties:
                type: string
          description: Company-specific estimator overrides
        createdAt:
          type: string
          format: date-time
      required: [id, name, province, city, createdAt]

    CreateCompanyBody:
      type: object
      properties:
        name:
          type: string
        province:
          type: string
        city:
          type: string
        phone:
          type: string
      required: [name, province, city]

    UpdateMemberRoleBody:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/UserRole"
      required: [role]

    # ── Invitations ──────────────────────────────────────────────────────────
    Invitation:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        preferredLanguage:
          type: string
          enum: [en, it, pt, es]
          default: en
        token:
          type: string
        status:
          type: string
          enum: [pending, accepted, expired]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        company:
          $ref: "#/components/schemas/Company"
          nullable: true
      required: [id, companyId, email, role, preferredLanguage, token, status, expiresAt, createdAt]

    CreateInvitationBody:
      type: object
      properties:
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        preferredLanguage:
          type: string
          enum: [en, it, pt, es]
          default: en
      required: [email, role]

    UpdateInvitationBody:
      type: object
      properties:
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        preferredLanguage:
          type: string
          enum: [en, it, pt, es]

    # ── Projects ─────────────────────────────────────────────────────────────
    Project:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        address:
          type: string
        city:
          type: string
        province:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        budget:
          type: number
          nullable: true
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, companyId, name, address, city, province, status, createdAt]

    ProjectStatus:
      type: string
      enum: [planning, active, on_hold, completed, cancelled]

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        province:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
        description:
          type: string
      required: [name, address, city, province]

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        province:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
        description:
          type: string

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: integer
        projectName:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        totalBudget:
          type: number
          nullable: true
        totalSpent:
          type: number
        budgetUtilizationPercent:
          type: number
          nullable: true
        reportCount:
          type: integer
        openRFICount:
          type: integer
        closedRFICount:
          type: integer
        lastReportDate:
          type: string
          format: date
          nullable: true
      required: [projectId, projectName, status, totalSpent, reportCount, openRFICount, closedRFICount]

    # ── Daily Reports ─────────────────────────────────────────────────────────
    DailyReportListItem:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        projectName:
          type: string
          nullable: true
        reportDate:
          type: string
          format: date
        submittedByName:
          type: string
        weather:
          type: string
          nullable: true
        temperature:
          type: string
          nullable: true
        crewCount:
          type: integer
        workPerformed:
          type: string
        issues:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, projectId, reportDate, submittedByName, crewCount, workPerformed, createdAt]

    DailyReport:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        submittedByUserId:
          type: integer
        reportDate:
          type: string
          format: date
        weather:
          type: string
          nullable: true
        temperature:
          type: string
          nullable: true
        crewCount:
          type: integer
        workPerformed:
          type: string
        materialsUsed:
          type: string
          nullable: true
        equipment:
          type: string
          nullable: true
        issues:
          type: string
          nullable: true
        aiSummary:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        submittedBy:
          $ref: "#/components/schemas/User"
          nullable: true
      required: [id, projectId, submittedByUserId, reportDate, crewCount, workPerformed, createdAt]

    CreateDailyReportBody:
      type: object
      properties:
        reportDate:
          type: string
          format: date
        weather:
          type: string
        temperature:
          type: string
        crewCount:
          type: integer
        workPerformed:
          type: string
        materialsUsed:
          type: string
        equipment:
          type: string
        issues:
          type: string
        aiSummary:
          type: string
      required: [reportDate, crewCount, workPerformed]

    # ── Cost Analyses ─────────────────────────────────────────────────────────
    CostAnalysis:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        periodLabel:
          type: string
        labourCost:
          type: number
        materialsCost:
          type: number
        equipmentCost:
          type: number
        otherCost:
          type: number
        totalCost:
          type: number
        notes:
          type: string
          nullable: true
        aiAnalysis:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, projectId, periodLabel, labourCost, materialsCost, equipmentCost, otherCost, totalCost, createdAt]

    CreateCostAnalysisBody:
      type: object
      properties:
        periodLabel:
          type: string
        labourCost:
          type: number
        materialsCost:
          type: number
        equipmentCost:
          type: number
        otherCost:
          type: number
        notes:
          type: string
        aiAnalysis:
          type: string
      required: [periodLabel, labourCost, materialsCost, equipmentCost, otherCost]

    RFIListItem:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        projectName:
          type: string
          nullable: true
        rfiNumber:
          type: string
        subject:
          type: string
        status:
          $ref: "#/components/schemas/RFIStatus"
        priority:
          $ref: "#/components/schemas/RFIPriority"
        submittedByName:
          type: string
        dueDate:
          type: string
          format: date
          nullable: true
        createdAt:
