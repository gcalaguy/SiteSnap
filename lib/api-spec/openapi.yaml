    TradehubPost:
      type: object
      required: [id, userId, type, title, content, createdAt, commentCount, reactionCount, hasReacted, applicationCount, media]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          enum: [discussion, job, showcase]
        title:
          type: string
        content:
          type: string
        trade:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        province:
          type: string
          nullable: true
        budget:
          type: string
          nullable: true
        jobType:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        commentCount:
          type: integer
        reactionCount:
          type: integer
        hasReacted:
          type: boolean
        applicationCount:
          type: integer
        author:
          $ref: "#/components/schemas/TradehubAuthor"
        profile:
          $ref: "#/components/schemas/TradehubProfileSnippet"
        media:
          type: array
          items:
            $ref: "#/components/schemas/TradehubMedia"

    TradehubComment:
      type: object
      required: [id, postId, userId, content, createdAt]
      properties:
        id:
          type: integer
        postId:
          type: integer
        userId:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time
        author:
          $ref: "#/components/schemas/TradehubAuthor"
        profile:
          $ref: "#/components/schemas/TradehubProfileSnippet"

    TradehubApplication:
      type: object
      required: [id, postId, applicantId, status, createdAt]
      properties:
        id:
          type: integer
        postId:
          type: integer
        applicantId:
          type: integer
        status:
          type: string
          enum: [pending, accepted, reviewed, rejected]
        message:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    TradehubPostDetail:
      allOf:
        - $ref: "#/components/schemas/TradehubPost"
        - type: object
          properties:
            comments:
              type: array
              items:
                $ref: "#/components/schemas/TradehubComment"
            applications:
              type: array
              items:
                $ref: "#/components/schemas/TradehubApplication"

    TradehubFeedResponse:
      type: object
      required: [posts, page, hasMore]
      properties:
        posts:
          type: array
          items:
            $ref: "#/components/schemas/TradehubPost"
        page:
          type: integer
        hasMore:
          type: boolean

    CreateTradehubPostBody:
      type: object
      required: [type, title, content]
      properties:
        type:
          type: string
          enum: [discussion, job, showcase]
        title:
          type: string
          minLength: 1
          maxLength: 200
        content:
          type: string
          minLength: 1
          maxLength: 5000
        trade:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 200
        province:
          type: string
          maxLength: 50
        budget:
          type: string
          maxLength: 50
        jobType:
          type: string
          maxLength: 50

    TradehubProfile:
      type: object
      required: [userId, displayName, createdAt]
      properties:
        userId:
          type: integer
        displayName:
          type: string
        trade:
          type: string
          nullable: true
        location:
          type: string
          nullable: true
        province:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        isVerified:
          type: boolean
        complianceStatus:
          type: string
          nullable: true
        voiceIntroUrl:
          type: string
          nullable: true
        voiceIntroDuration:
          type: integer
          nullable: true
        createdAt:
          type: string
          format: date-time
        recentPosts:
          type: array
          items:
            $ref: "#/components/schemas/TradehubPost"

    UpsertTradehubProfileBody:
      type: object
      required: [displayName]
      properties:
        displayName:
          type: string
          minLength: 1
          maxLength: 200
        trade:
          type: string
          maxLength: 100
        location:
          type: string
          maxLength: 200
        province:
          type: string
          maxLength: 50
        bio:
          type: string
          maxLength: 2000
        website:
          type: string
          maxLength: 500
        complianceStatus:
          type: string
          enum: [compliant, warning, non_compliant]

    TradehubNotification:
      type: object
      required: [id, userId, message, isRead, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        type:
          type: string
          nullable: true
        message:
          type: string
        referenceId:
          type: integer
          nullable: true
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CreateTradehubReportBody:
      type: object
      required: [targetType, targetId, reason]
      properties:
        targetType:
          type: string
          enum: [post, user, comment]
        targetId:
          type: integer
        reason:
          type: string
          minLength: 1
          maxLength: 1000

    TradehubUserSearchResult:
      type: object
      required: [userId, displayName]
      properties:
        userId:
          type: integer
        displayName:
          type: string
        trade:
          type: string
          nullable: true
        province:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true

    TradehubConversationParticipant:
      type: object
      properties:
        userId:
          type: integer
        displayName:
          type: string
        trade:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true

    TradehubLastMessage:
      type: object
      properties:
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    TradehubConversation:
      type: object
      required: [id, createdAt, unreadCount]
      properties:
        id:
          type: integer
        createdAt:
          type: string
          format: date-time
        unreadCount:
          type: integer
        otherParticipant:
          $ref: "#/components/schemas/TradehubConversationParticipant"
        lastMessage:
          $ref: "#/components/schemas/TradehubLastMessage"

    CreateTradehubConversationBody:
      type: object
      required: [recipientId, message]
      properties:
        recipientId:
          type: integer
        message:
          type: string
          minLength: 1
          maxLength: 5000

    TradehubMessage:
      type: object
      required: [id, conversationId, senderId, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        senderId:
          type: integer
        content:
          type: string
        createdAt:
          type: string
          format: date-time

    # ── Inspection schemas ─────────────────────────────────────────────────────

    InspectionRecord:
      type: object
      required: [id, companyId, inspectorId, inspectionType, date, status, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        projectId:
          type: integer
          nullable: true
        inspectorId:
          type: integer
        inspectionType:
          type: string
          enum: [general, safety, quality, progress, electrical, structural, fire, environmental]
        date:
          type: string
        score:
          type: integer
          nullable: true
        status:
          type: string
          enum: [draft, submitted]
        aiSummary:
          type: string
          nullable: true
        riskLevel:
          type: string
          nullable: true
        riskScore:
          type: string
          nullable: true
        failedItemAnalysis:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    InspectionItem:
      type: object
      required: [id, itemName, status, severity]
      properties:
        id:
          type: integer
        itemName:
          type: string
        status:
          type: string
          enum: [pass, fail, na]
        severity:
          type: string
          enum: [low, medium, high]
        comment:
          type: string
          nullable: true

    InspectionProjectRef:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string

    InspectionInspectorRef:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string

    InspectionRow:
      type: object
      required: [inspection]
      properties:
        inspection:
          $ref: "#/components/schemas/InspectionRecord"
        project:
          $ref: "#/components/schemas/InspectionProjectRef"
        inspector:
          $ref: "#/components/schemas/InspectionInspectorRef"

    InspectionDetail:
      type: object
      required: [inspection, items]
      properties:
        inspection:
          $ref: "#/components/schemas/InspectionRecord"
        project:
          $ref: "#/components/schemas/InspectionProjectRef"
        inspector:
          $ref: "#/components/schemas/InspectionInspectorRef"
        items:
          type: array
          items:
            $ref: "#/components/schemas/InspectionItem"

    CreateInspectionItemBody:
      type: object
      required: [itemName]
      properties:
        itemName:
          type: string
          minLength: 1
        status:
          type: string
          enum: [pass, fail, na]
          default: pass
        severity:
          type: string
          enum: [low, medium, high]
          default: low
        comment:
          type: string

    CreateInspectionBody:
      type: object
      required: [inspectionType, date, items]
      properties:
        projectId:
          type: integer
          nullable: true
        inspectionType:
          type: string
          enum: [general, safety, quality, progress, electrical, structural, fire, environmental]
        date:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/CreateInspectionItemBody"
          minItems: 1
        submit:
          type: boolean
          default: false

    InspectionAlertData:
      type: object
      required: [id, type, message, severity, isRead, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        message:
          type: string
        severity:
          type: string
          enum: [low, medium, high, critical]
        isRead:
          type: boolean
        createdAt:
          type: string
          format: date-time

    InspectionAlertRow:
      type: object
      required: [inspectionId]
      properties:
        inspectionId:
          type: integer
        alert:
          $ref: "#/components/schemas/InspectionAlertData"
        project:
          $ref: "#/components/schemas/InspectionProjectRef"
        inspection:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            inspectionType:
              type: string
            date:
              type: string

    BillingSeats:
      type: object
      required: [currentSeats, maxSeats, canAddMore]
      properties:
        currentSeats:
          type: integer
        maxSeats:
          oneOf:
            - type: integer
            - type: string
              enum: [unlimited]
        canAddMore:
          type: boolean
        planName:
          type: string
          nullable: true
        subscriptionStatus:
          type: string
          nullable: true

    EmailConfig:
      type: object
      required: [fromEmail, isCustomDomain, resendKeySet]
      properties:
        fromEmail:
          type: string
        isCustomDomain:
          type: boolean
        resendKeySet:
          type: boolean

    QuickBooksConnection:
      type: object
      required: [realmId, environment, connectedAt]
      properties:
        realmId:
          type: string
        environment:
          type: string
        lastInvoiceSyncAt:
          type: string
          format: date-time
          nullable: true
        lastCostSyncAt:
          type: string
          format: date-time
          nullable: true
        syncedInvoiceCount:
          type: integer
          nullable: true
        syncedCostCount:
          type: integer
          nullable: true
        connectedAt:
          type: string
          format: date-time

    QuickBooksStatus:
      type: object
      required: [connected, configured, connection]
      properties:
        connected:
          type: boolean
        configured:
          type: boolean
        connection:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/QuickBooksConnection"

    CompanySettings:
      type: object
      required: [quoteNumberPrefix, invoiceNumberPrefix, quoteStartNumber, invoiceStartNumber, defaultQuoteTerms, defaultInvoiceNotes]
      properties:
        estimatorConfig:
          type: object
          additionalProperties: true
        quoteNumberPrefix:
          type: string
        invoiceNumberPrefix:
          type: string
        quoteStartNumber:
          type: integer
        invoiceStartNumber:
          type: integer
        defaultQuoteTerms:
          type: string
        defaultInvoiceNotes:
          type: string

    AccountingExportRow:
      type: object
      required: [date, documentNumber, projectSite, accountCode, vendorPayee, grossAmount, tax]
      properties:
        date:
          type: string
        documentNumber:
          type: string
        projectSite:
          type: string
        accountCode:
          type: string
        vendorPayee:
          type: string
        grossAmount:
          type: string
        tax:
          type: string

    QuickBooksAuthUrl:
      type: object
      required: [url]
      properties:
        url:
          type: string

    QuickBooksSyncResult:
      type: object
      required: [synced, total, errors]
      properties:
        synced:
          type: integer
        total:
          type: integer
        errors:
          type: array
          items:
            type: string

    CompanyLogoUpdate:
      type: object
      required: [logoPath]
      properties:
        logoPath:
          type: string
          description: Object storage path; pass empty string to remove logo

    CompanyTemplateUpdate:
      type: object
      required: [templatePath]
      properties:
        templatePath:
          type: ["string", "null"]
          description: Object storage path; pass null or empty string to clear

    CompanyDocumentSettingsUpdate:
      type: object
      properties:
        quoteNumberPrefix:
          type: string
        invoiceNumberPrefix:
          type: string
        quoteStartNumber:
          type: integer
        invoiceStartNumber:
          type: integer
        defaultQuoteTerms:
          type: ["string", "null"]
        defaultInvoiceNotes:
          type: ["string", "null"]
