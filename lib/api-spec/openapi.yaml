openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Construction AI Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: super-admin
    description: Super Admin — plan, feature, and tenant management
  - name: users
    description: User management and auth sync
  - name: companies
    description: Company / multi-tenant management
  - name: projects
    description: Construction project management
  - name: daily-reports
    description: Daily site reports
  - name: cost-analyses
    description: Cost tracking and analysis
  - name: rfis
    description: Requests for Information
  - name: invitations
    description: Team invite flow
  - name: ai
    description: AI agent endpoints
  - name: dashboard
    description: Dashboard summary endpoints
  - name: tasks
    description: Project task management
  - name: Storage
    description: Object storage upload and serving endpoints
  - name: photos
    description: Daily report photo management
  - name: documents
    description: Project document upload, storage, and AI extraction
  - name: quotes
    description: Quote creation, AI filling, and approval workflow
  - name: invoices
    description: Invoice management and payment tracking
  - name: contacts
    description: CRM contact management
  - name: forms
    description: Form templates and submissions for safety and incidents
  - name: files
    description: General file attachment management
  - name: financials
    description: Payments, change orders, and financial dashboard
  - name: proposals
    description: Estimate builder, templates, and proposal management
  - name: leads
    description: Lead management and pipeline tracking
  - name: activities
    description: Lead activity logging
  - name: estimator
    description: Smart Estimator pricing models and add-ons
  - name: field-automation
    description: Field logs, site photos, and safety signoffs
  - name: worker-vault
    description: Worker compliance documents and certificate vault
  - name: trade-reviews
    description: 5-star review and feedback rating system for TradeHub
  - name: tradehub
    description: TradeHub social network – posts, jobs, messages, profiles, and notifications
  - name: inspections
    description: AI-powered site inspections and inspection alerts
  - name: billing
    description: Billing, subscription, and seat management
  - name: settings
    description: Company settings and configuration
  - name: quickbooks
    description: QuickBooks Online integration

paths:
  # ── Forms ────────────────────────────────────────────────────────────────────
  /forms:
    get:
      operationId: listForms
      tags: [forms]
      summary: List all active form templates
      responses:
        "200":
          description: Form templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormTemplateRecord"
    post:
      operationId: createForm
      tags: [forms]
      summary: Create a form template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormTemplateRecord"

  /forms/{id}:
    get:
      operationId: getForm
      tags: [forms]
      summary: Get a form template
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormTemplateRecord"
    put:
      operationId: updateForm
      tags: [forms]
      summary: Update a form template
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormTemplateRecord"
    delete:
      operationId: deleteForm
      tags: [forms]
      summary: Deactivate a form template
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deactivated

  /form-submissions:
    get:
      operationId: listFormSubmissions
      tags: [forms]
      summary: List form submissions
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: projectId
          schema:
            type: integer
        - in: query
          name: contactId
          schema:
            type: integer
      responses:
        "200":
          description: Submissions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FormSubmissionRecord"
    post:
      operationId: createFormSubmission
      tags: [forms]
      summary: Create a form submission
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFormSubmissionBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormSubmissionRecord"

  /form-submissions/{id}:
    get:
      operationId: getFormSubmission
      tags: [forms]
      summary: Get a form submission
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submission detail
          content:
            application/json:
              schema:
                type: object

  /form-submissions/{id}/status:
    patch:
      operationId: updateFormSubmissionStatus
      tags: [forms]
      summary: Review or approve a form submission
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [reviewed, approved]
                notes:
                  type: string
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FormSubmissionRecord"

  # ── Files ─────────────────────────────────────────────────────────────────────
  /files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List file attachments for an entity
      parameters:
        - in: query
          name: entityType
          schema:
            type: string
        - in: query
          name: entityId
          schema:
            type: integer
      responses:
        "200":
          description: File attachments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileAttachmentRecord"
    post:
      operationId: registerFile
      tags: [files]
      summary: Register a file after presigned upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterFileBody"
      responses:
        "201":
          description: Created file record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileAttachmentRecord"

  /files/{id}:
    delete:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file attachment record
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Financials ───────────────────────────────────────────────────────────────
  /financials/summary:
    get:
      operationId: getFinancialSummary
      tags: [financials]
      summary: Financial overview stats
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FinancialSummary"

  /payments:
    get:
      operationId: listPayments
      tags: [financials]
      summary: List all payments for company
      responses:
        "200":
          description: Payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PaymentRecord"

  /payments/{id}:
    delete:
      operationId: deletePayment
      tags: [financials]
      summary: Delete a payment
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{id}/payments:
    get:
      operationId: getInvoicePayments
      tags: [financials]
      summary: Get payments and balance for an invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice payments with balance
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoicePaymentSummary"
    post:
      operationId: recordPayment
      tags: [financials]
      summary: Record a payment against an invoice
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecordPaymentBody"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentRecord"

  /invoices/from-proposal/{proposalId}:
    post:
      operationId: createInvoiceFromProposal
      tags: [financials]
      summary: Generate an invoice from an approved proposal
      parameters:
        - in: path
          name: proposalId
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Created invoice
          content:
            application/json:
              schema:
                type: object

  /change-orders:
    get:
      operationId: listChangeOrders
      tags: [financials]
      summary: List change orders
      parameters:
        - in: query
          name: projectId
          schema:
            type: integer
      responses:
        "200":
          description: Change orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChangeOrderRecord"
    post:
      operationId: createChangeOrder
      tags: [financials]
      summary: Create a change order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChangeOrderBody"
      responses:
        "201":
          description: Created change order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeOrderRecord"

  /change-orders/{id}:
    get:
      operationId: getChangeOrder
      tags: [financials]
      summary: Get a change order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Change order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeOrderRecord"
    patch:
      operationId: updateChangeOrder
      tags: [financials]
      summary: Update a change order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateChangeOrderBody"
      responses:
        "200":
          description: Updated change order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeOrderRecord"
    delete:
      operationId: deleteChangeOrder
      tags: [financials]
      summary: Delete a change order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /change-orders/{id}/approve:
    post:
      operationId: approveChangeOrder
      tags: [financials]
      summary: Approve a change order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeOrderRecord"

  /change-orders/{id}/reject:
    post:
      operationId: rejectChangeOrder
      tags: [financials]
      summary: Reject a change order
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChangeOrderRecord"

  # ── Builder Estimates ────────────────────────────────────────────────────────
  /builder-estimates:
    get:
      operationId: listBuilderEstimates
      tags: [proposals]
      summary: List all manual estimates
      responses:
        "200":
          description: List of estimates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BuilderEstimate"
    post:
      operationId: createBuilderEstimate
      tags: [proposals]
      summary: Create a new estimate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBuilderEstimateBody"
      responses:
        "201":
          description: Created estimate with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuilderEstimateWithItems"

  /builder-estimates/{id}:
    get:
      operationId: getBuilderEstimate
      tags: [proposals]
      summary: Get estimate with items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Estimate with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuilderEstimateWithItems"
    patch:
      operationId: updateBuilderEstimate
      tags: [proposals]
      summary: Update estimate metadata
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBuilderEstimateBody"
      responses:
        "200":
          description: Updated estimate with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuilderEstimateWithItems"
    delete:
      operationId: deleteBuilderEstimate
      tags: [proposals]
      summary: Delete estimate
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /builder-estimates/{id}/items:
    post:
      operationId: createBuilderEstimateItem
      tags: [proposals]
      summary: Add a line item to an estimate
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateItemBody"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuilderEstimateItem"

  /builder-estimates/{id}/items/{itemId}:
    patch:
      operationId: updateBuilderEstimateItem
      tags: [proposals]
      summary: Update a line item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EstimateItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuilderEstimateItem"
    delete:
      operationId: deleteBuilderEstimateItem
      tags: [proposals]
      summary: Delete a line item
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
        - in: path
          name: itemId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /builder-estimates/{id}/convert:
    post:
      operationId: convertEstimateToProposal
      tags: [proposals]
      summary: Convert estimate into a proposal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertEstimateBody"
      responses:
        "201":
          description: Created proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"

  # ── Estimate Templates ────────────────────────────────────────────────────────
  /estimate-templates:
    get:
      operationId: listEstimateTemplates
      tags: [proposals]
      summary: List saved estimate templates
      responses:
        "200":
          description: Templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EstimateTemplate"
    post:
      operationId: createEstimateTemplate
      tags: [proposals]
      summary: Save a new estimate template
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEstimateTemplateBody"
      responses:
        "201":
          description: Created template with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateTemplateWithItems"

  /estimate-templates/{id}/items:
    get:
      operationId: getEstimateTemplateItems
      tags: [proposals]
      summary: Get template with items
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Template with items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EstimateTemplateWithItems"

  /estimate-templates/{id}:
    delete:
      operationId: deleteEstimateTemplate
      tags: [proposals]
      summary: Delete a template
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Proposals ────────────────────────────────────────────────────────────────
  /proposals:
    get:
      operationId: listProposals
      tags: [proposals]
      summary: List all proposals
      responses:
        "200":
          description: Proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProposalRecord"

  /proposals/{id}:
    get:
      operationId: getProposal
      tags: [proposals]
      summary: Get proposal with estimate
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Proposal with estimate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalWithEstimate"
    patch:
      operationId: updateProposal
      tags: [proposals]
      summary: Update proposal status or metadata
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProposalBody"
      responses:
        "200":
          description: Updated proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"
    delete:
      operationId: deleteProposal
      tags: [proposals]
      summary: Delete a proposal
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /proposals/{id}/approve:
    post:
      operationId: approveProposal
      tags: [proposals]
      summary: Approve a proposal (simulate e-signature)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveProposalBody"
      responses:
        "200":
          description: Approved proposal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProposalRecord"

  # ── Leads ───────────────────────────────────────────────────────────────────
  /leads:
    get:
      operationId: listLeads
      tags: [leads]
      summary: List all leads for the company
      responses:
        "200":
          description: List of leads with contact info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadWithContact"
    post:
      operationId: createLead
      tags: [leads]
      summary: Create a new lead
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "201":
          description: Created lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadWithContact"

  /leads/{leadId}:
    get:
      operationId: getLead
      tags: [leads]
      summary: Get a single lead
      parameters:
        - in: path
          name: leadId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lead with contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadWithContact"
        "404":
          description: Not found
    patch:
      operationId: updateLead
      tags: [leads]
      summary: Update a lead (including stage)
      parameters:
        - in: path
          name: leadId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeadBody"
      responses:
        "200":
          description: Updated lead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadWithContact"
    delete:
      operationId: deleteLead
      tags: [leads]
      summary: Delete a lead
      parameters:
        - in: path
          name: leadId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /leads/{leadId}/convert:
    post:
      operationId: convertLead
      tags: [leads]
      summary: Convert a won lead into a project
      parameters:
        - in: path
          name: leadId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvertLeadBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                type: object
                properties:
                  project:
                    $ref: "#/components/schemas/Project"
                  leadId:
                    type: integer

  /leads/{leadId}/activities:
    get:
      operationId: listLeadActivities
      tags: [activities]
      summary: List activities for a lead
      parameters:
        - in: path
          name: leadId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeadActivity"
    post:
      operationId: createLeadActivity
      tags: [activities]
      summary: Log an activity for a lead
      parameters:
        - in: path
          name: leadId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateActivityBody"
      responses:
        "201":
          description: Created activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeadActivity"

  # ── Contacts ────────────────────────────────────────────────────────────────
  /contacts:
    get:
      operationId: listContacts
      tags: [contacts]
      summary: List all contacts for the company
      parameters:
        - in: query
          name: search
          schema:
            type: string
        - in: query
          name: type
          schema:
            type: string
            enum: [client, worker, subcontractor, supplier]
      responses:
        "200":
          description: List of contacts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contact"
    post:
      operationId: createContact
      tags: [contacts]
      summary: Create a new contact
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactBody"
      responses:
        "201":
          description: Created contact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contact"

  /contacts/{contactId}:
    get:
      operationId: getContact
      tags: [contacts]
      summary: Get a single contact
      parameters:
        - in: path
          name: contactId
          required: true
          schema:
            type: integer
      responses:
        "200":
