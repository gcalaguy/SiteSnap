  /integrations/export-sheets:
    post:
      operationId: exportSheets
      tags: [integrations]
      summary: Export financials to Google Sheets
      description: |
        Pulls invoices, payments, and change orders for the user's company
        and appends them as rows to a specified Google Sheet. Requires the
        user to have linked their Google account and have `viewFinancials`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportSheetsBody"
      responses:
        "200":
          description: Rows appended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExportSheetsResponse"
        "400":
          description: Bad request or Google account not linked
        "502":
          description: Failed to write to Google Sheets

  /integrations/create-google-calendar-event:
    post:
      operationId: createGoogleCalendarEvent
      tags: [integrations]
      summary: Create a Google Calendar event
      description: |
        Creates a new event in the authenticated user's primary Google Calendar.
        Requires the user to have linked their Google account via OAuth.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CalendarEventBody"
      responses:
        "200":
          description: Event created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleCalendarEventResponse"
        "400":
          description: Bad request or Google account not linked
        "502":
          description: Failed to create Google Calendar event

