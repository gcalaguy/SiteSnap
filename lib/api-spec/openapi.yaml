openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Construction AI Assistant API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User management and auth sync
  - name: companies
    description: Company / multi-tenant management
  - name: projects
    description: Construction project management
  - name: daily-reports
    description: Daily site reports
  - name: cost-analyses
    description: Cost tracking and analysis
  - name: rfis
    description: Requests for Information
  - name: invitations
    description: Team invite flow
  - name: ai
    description: AI agent endpoints
  - name: dashboard
    description: Dashboard summary endpoints
  - name: tasks
    description: Project task management
  - name: Storage
    description: Object storage upload and serving endpoints
  - name: photos
    description: Daily report photo management
  - name: documents
    description: Project document upload, storage, and AI extraction
  - name: quotes
    description: Quote creation, AI filling, and approval workflow
  - name: invoices
    description: Invoice management and payment tracking

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Users ──────────────────────────────────────────────────────────────────
  /users/me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current authenticated user with company and role
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithCompany"
        "401":
          description: Unauthorized

  /users/accept-terms:
    post:
      operationId: acceptTerms
      tags: [users]
      summary: Record that the current user accepted the Terms and Conditions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Updated user with termsAcceptedAt set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithCompany"

  /users/sync:
    post:
      operationId: syncUser
      tags: [users]
      summary: Sync Clerk user to database (called after sign-in/sign-up)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncUserBody"
      responses:
        "200":
          description: User synced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Companies ──────────────────────────────────────────────────────────────
  /companies:
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a new company (onboarding — owner creates company)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyBody"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{companyId}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get company details
      parameters:
        - $ref: "#/components/parameters/companyId"
      responses:
        "200":
          description: Company details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{companyId}/members:
    get:
      operationId: listCompanyMembers
      tags: [companies]
      summary: List all members of a company
      parameters:
        - $ref: "#/components/parameters/companyId"
      responses:
        "200":
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserWithCompany"

  /companies/{companyId}/members/{userId}:
    delete:
      operationId: removeCompanyMember
      tags: [companies]
      summary: Remove a member from the company
      parameters:
        - $ref: "#/components/parameters/companyId"
        - $ref: "#/components/parameters/userId"
      responses:
        "204":
          description: Member removed

    patch:
      operationId: updateMemberRole
      tags: [companies]
      summary: Update a member's role
      parameters:
        - $ref: "#/components/parameters/companyId"
        - $ref: "#/components/parameters/userId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMemberRoleBody"
      responses:
        "200":
          description: Role updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithCompany"

  # ── Invitations ────────────────────────────────────────────────────────────
  /invitations:
    post:
      operationId: createInvitation
      tags: [invitations]
      summary: Invite a team member via email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvitationBody"
      responses:
        "201":
          description: Invitation sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"

  /invitations/company:
    get:
      operationId: listInvitations
      tags: [invitations]
      summary: List all pending invitations for the current user's company
      responses:
        "200":
          description: Invitations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"

  /invitations/{id}:
    patch:
      operationId: updateInvitation
      tags: [invitations]
      summary: Edit a pending invitation's email or role
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvitationBody"
      responses:
        "200":
          description: Updated invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "404":
          description: Not found
        "409":
          description: Not pending
    delete:
      operationId: revokeInvitation
      tags: [invitations]
      summary: Revoke a pending invitation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Revoked
        "404":
          description: Not found

  /invitations/{token}:
    get:
      operationId: getInvitation
      tags: [invitations]
      summary: Verify and get invitation details by token
      parameters:
        - $ref: "#/components/parameters/token"
      responses:
        "200":
          description: Invitation details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"
        "404":
          description: Invitation not found or expired

  /invitations/{token}/accept:
    post:
      operationId: acceptInvitation
      tags: [invitations]
      summary: Accept an invitation and join the company
      parameters:
        - $ref: "#/components/parameters/token"
      responses:
        "200":
          description: Invitation accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithCompany"

  # ── Projects ───────────────────────────────────────────────────────────────
  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects for the current user's company
      responses:
        "200":
          description: Projects list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project details
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

    put:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "204":
          description: Project deleted

  /projects/{projectId}/members:
    get:
      operationId: listProjectMembers
      tags: [projects]
      summary: List workers assigned to a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Assigned project members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectMember"

    post:
      operationId: addProjectMember
      tags: [projects]
      summary: Assign a worker to a project (owner/foreman only)
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProjectMemberBody"
      responses:
        "201":
          description: Member assigned
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectMemberRecord"

  /projects/{projectId}/members/{memberId}:
    delete:
      operationId: removeProjectMember
      tags: [projects]
      summary: Remove a worker from a project (owner/foreman only)
      parameters:
        - $ref: "#/components/parameters/projectId"
        - name: memberId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Member removed

  /projects/{projectId}/summary:
    get:
      operationId: getProjectSummary
      tags: [projects]
      summary: Get a project overview with cost totals, report count, and RFI stats
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Project summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"

  # ── Daily Reports ──────────────────────────────────────────────────────────
  /projects/{projectId}/daily-reports:
    get:
      operationId: listDailyReports
      tags: [daily-reports]
      summary: List daily reports for a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Daily reports list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyReport"

    post:
      operationId: createDailyReport
      tags: [daily-reports]
      summary: Create a daily report
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyReportBody"
      responses:
        "201":
          description: Daily report created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  /projects/{projectId}/daily-reports/{reportId}:
    get:
      operationId: getDailyReport
      tags: [daily-reports]
      summary: Get a specific daily report
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/reportId"
      responses:
        "200":
          description: Daily report details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

    put:
      operationId: updateDailyReport
      tags: [daily-reports]
      summary: Update a daily report
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/reportId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDailyReportBody"
      responses:
        "200":
          description: Daily report updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReport"

  # ── Cost Analyses ──────────────────────────────────────────────────────────
  /projects/{projectId}/cost-analyses:
    get:
      operationId: listCostAnalyses
      tags: [cost-analyses]
      summary: List cost analyses for a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: Cost analyses list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostAnalysis"

    post:
      operationId: createCostAnalysis
      tags: [cost-analyses]
      summary: Create a cost analysis entry
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCostAnalysisBody"
      responses:
        "201":
          description: Cost analysis created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostAnalysis"

  /projects/{projectId}/cost-analyses/{analysisId}:
    get:
      operationId: getCostAnalysis
      tags: [cost-analyses]
      summary: Get a specific cost analysis
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/analysisId"
      responses:
        "200":
          description: Cost analysis details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostAnalysis"

  # ── RFIs ───────────────────────────────────────────────────────────────────
  /projects/{projectId}/rfis:
    get:
      operationId: listRFIs
      tags: [rfis]
      summary: List RFIs for a project
      parameters:
        - $ref: "#/components/parameters/projectId"
      responses:
        "200":
          description: RFI list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RFI"

    post:
      operationId: createRFI
      tags: [rfis]
      summary: Create an RFI
      parameters:
        - $ref: "#/components/parameters/projectId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRFIBody"
      responses:
        "201":
          description: RFI created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFI"

  /projects/{projectId}/rfis/{rfiId}:
    get:
      operationId: getRFI
      tags: [rfis]
      summary: Get a specific RFI
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/rfiId"
      responses:
        "200":
          description: RFI details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFI"

    put:
      operationId: updateRFI
      tags: [rfis]
      summary: Update an RFI (respond, change status)
      parameters:
        - $ref: "#/components/parameters/projectId"
        - $ref: "#/components/parameters/rfiId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRFIBody"
      responses:
        "200":
          description: RFI updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RFI"

  # ── AI Agents ──────────────────────────────────────────────────────────────
  /ai/daily-report/generate:
    post:
      operationId: generateDailyReportAI
      tags: [ai]
      summary: AI generates a structured daily report summary from raw input
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIGenerateDailyReportBody"
      responses:
        "200":
          description: AI-generated daily report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIGeneratedDailyReport"

  /ai/cost-analysis/generate:
    post:
      operationId: generateCostAnalysisAI
      tags: [ai]
      summary: AI generates a cost analysis summary and recommendations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIGenerateCostAnalysisBody"
      responses:
        "200":
          description: AI-generated cost analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIGeneratedCostAnalysis"

  /ai/assistant:
    post:
      operationId: chatWithAssistant
      tags: [ai]
      summary: AI construction assistant — conversational chat for field crew
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIAssistantBody"
      responses:
        "200":
          description: AI reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIAssistantResponse"

  /ai/rfi/generate:
    post:
      operationId: generateRFIAI
      tags: [ai]
      summary: AI drafts an RFI document from a description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AIGenerateRFIBody"
      responses:
        "200":
          description: AI-generated RFI draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIGeneratedRFI"

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get company-wide dashboard summary (active projects, reports this week, pending RFIs, spend totals)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent company activity feed (latest reports, RFIs, project updates)
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ── Tasks ────────────────────────────────────────────────────────────────────
  /projects/{projectId}/tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List all tasks for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Task list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create a task for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskBody"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /projects/{projectId}/tasks/{taskId}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update a task
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTaskBody"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete a task
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Photos ────────────────────────────────────────────────────────────────────
  /projects/{projectId}/daily-reports/{reportId}/photos:
    get:
      operationId: listReportPhotos
      tags: [photos]
      summary: List photos for a daily report
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Photos list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DailyReportPhoto"
    post:
      operationId: addReportPhoto
      tags: [photos]
      summary: Add a photo to a daily report after upload
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPhotoBody"
      responses:
        "201":
          description: Photo added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DailyReportPhoto"

  /projects/{projectId}/daily-reports/{reportId}/photos/{photoId}:
    delete:
      operationId: deleteReportPhoto
      tags: [photos]
      summary: Delete a photo from a daily report
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: reportId
          in: path
          required: true
          schema:
            type: integer
        - name: photoId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Documents ──────────────────────────────────────────────────────────────────
  /projects/{projectId}/documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List project documents
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectDocument"
    post:
      operationId: registerDocument
      tags: [documents]
      summary: Register a document after upload
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterDocumentBody"
      responses:
        "201":
          description: Document registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDocument"

  /projects/{projectId}/documents/{docId}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a project document
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: docId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/documents/{docId}/extract:
    post:
      operationId: extractDocument
      tags: [documents]
      summary: Run AI extraction on a document (images only)
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: docId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extraction result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectDocument"

  # ── Storage ────────────────────────────────────────────────────────────────────
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"

  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve a stored object
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Object content
          content:
            "*/*":
              schema:
                type: string
                format: binary
        "404":
          description: Not found

  # ── Quotes ──────────────────────────────────────────────────────────────────

  /projects/{projectId}/quotes:
    get:
      operationId: listQuotes
      tags: [quotes]
      summary: List quotes for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"
    post:
      operationId: createQuote
      tags: [quotes]
      summary: Create a new quote
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateQuoteBody"
      responses:
        "201":
          description: Created quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /projects/{projectId}/quotes/{quoteId}:
    get:
      operationId: getQuote
      tags: [quotes]
      summary: Get a quote by ID
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
        "404":
          description: Not found
    put:
      operationId: updateQuote
      tags: [quotes]
      summary: Update a quote
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateQuoteBody"
      responses:
        "200":
          description: Updated quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"
    delete:
      operationId: deleteQuote
      tags: [quotes]
      summary: Delete a quote
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{projectId}/quotes/{quoteId}/submit:
    post:
      operationId: submitQuoteForApproval
      tags: [quotes]
      summary: Submit quote for approval
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /projects/{projectId}/quotes/{quoteId}/unsubmit:
    post:
      operationId: unsubmitQuote
      tags: [quotes]
      summary: Revert a submitted quote back to draft
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote reverted to draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /projects/{projectId}/quotes/{quoteId}/approve:
    post:
      operationId: approveQuote
      tags: [quotes]
      summary: Approve a quote
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quote approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /projects/{projectId}/quotes/{quoteId}/reject:
    post:
      operationId: rejectQuote
      tags: [quotes]
      summary: Reject a quote
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        "200":
          description: Quote rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quote"

  /projects/{projectId}/quotes/{quoteId}/convert-to-invoice:
    post:
      operationId: convertQuoteToInvoice
      tags: [quotes]
      summary: Convert an approved quote to an invoice
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: quoteId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                dueDate:
                  type: string
                  format: date
                  nullable: true
      responses:
        "201":
          description: Invoice created from quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /ai/quote/generate:
    post:
      operationId: generateQuoteAI
      tags: [quotes, ai]
      summary: AI-generate quote line items from voice/text description
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuoteAIGenerateBody"
      responses:
        "200":
          description: AI-generated line items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuoteAIGenerateResponse"

  /timesheets:
    get:
      operationId: listTimesheets
      tags: [timesheets]
      summary: List timesheets (owner/foreman sees all, worker sees own)
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: userId
          in: query
          schema:
            type: integer
        - name: from
          in: query
          schema:
            type: string
            format: date
        - name: to
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: List of timesheets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Timesheet"
    post:
      operationId: submitTimesheet
      tags: [timesheets]
      summary: Submit a timesheet for a week
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubmitTimesheetBody"
      responses:
        "201":
          description: Timesheet submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Timesheet"

  /timesheets/{timesheetId}:
    get:
      operationId: getTimesheet
      tags: [timesheets]
      summary: Get a single timesheet
      parameters:
        - name: timesheetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Timesheet
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Timesheet"

  /timesheets/{timesheetId}/approve:
    post:
      operationId: approveTimesheet
      tags: [timesheets]
      summary: Approve a timesheet
      parameters:
        - name: timesheetId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        "200":
          description: Timesheet approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Timesheet"

  /timesheets/{timesheetId}/deny:
    post:
      operationId: denyTimesheet
      tags: [timesheets]
      summary: Deny a timesheet
      parameters:
        - name: timesheetId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        "200":
          description: Timesheet denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Timesheet"

  /quotes:
    get:
      operationId: listAllQuotes
      tags: [quotes]
      summary: List all quotes for the company
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, pending_approval, approved, rejected, converted]
            nullable: true
      responses:
        "200":
          description: List of quotes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quote"

  # ── Invoices ─────────────────────────────────────────────────────────────────

  /invoices:
    get:
      operationId: listAllInvoices
      tags: [invoices]
      summary: List all invoices for the company
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, sent, paid, overdue, cancelled]
            nullable: true
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /invoices/{invoiceId}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get an invoice by ID
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"
        "404":
          description: Not found
    put:
      operationId: updateInvoice
      tags: [invoices]
      summary: Update an invoice
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvoiceBody"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{invoiceId}/mark-sent:
    post:
      operationId: markInvoiceSent
      tags: [invoices]
      summary: Mark invoice as sent
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice marked sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{invoiceId}/mark-paid:
    post:
      operationId: markInvoicePaid
      tags: [invoices]
      summary: Mark invoice as paid
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice marked paid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /invoices/{invoiceId}/send-email:
    post:
      operationId: sendInvoiceEmail
      tags: [invoices]
      summary: Send invoice PDF to client via email
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [pdfBase64]
              properties:
                pdfBase64:
                  type: string
                  description: Base64-encoded PDF bytes
      responses:
        "200":
          description: Email sent
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  sandboxWarning:
                    type: string

  /invoices/{invoiceId}/send-reminder:
    post:
      operationId: sendInvoiceReminder
      tags: [invoices]
      summary: Manually send a payment reminder email to the client
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reminder sent (or sandbox warning)
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  sandboxWarning:
                    type: string

components:
  parameters:
    companyId:
      name: companyId
      in: path
      required: true
      schema:
        type: integer
    userId:
      name: userId
      in: path
      required: true
      schema:
        type: integer
    projectId:
      name: projectId
      in: path
      required: true
      schema:
        type: integer
    reportId:
      name: reportId
      in: path
      required: true
      schema:
        type: integer
    analysisId:
      name: analysisId
      in: path
      required: true
      schema:
        type: integer
    rfiId:
      name: rfiId
      in: path
      required: true
      schema:
        type: integer
    token:
      name: token
      in: path
      required: true
      schema:
        type: string

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Project Members ──────────────────────────────────────────────────────
    ProjectMember:
      type: object
      properties:
        id:
          type: integer
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        addedAt:
          type: string
          format: date-time
      required: [id, firstName, lastName, email, role, addedAt]

    ProjectMemberRecord:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: integer
        companyId:
          type: integer
        addedAt:
          type: string
          format: date-time
      required: [id, projectId, userId, companyId, addedAt]

    AddProjectMemberBody:
      type: object
      properties:
        userId:
          type: integer
      required: [userId]

    # ── Users ────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: integer
        clerkUserId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
        companyId:
          type: integer
          nullable: true
        role:
          $ref: "#/components/schemas/UserRole"
        termsAcceptedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, clerkUserId, email, firstName, lastName, role, createdAt]

    UserWithCompany:
      allOf:
        - $ref: "#/components/schemas/User"
        - type: object
          properties:
            company:
              $ref: "#/components/schemas/Company"
              nullable: true

    UserRole:
      type: string
      enum: [owner, foreman, worker]

    SyncUserBody:
      type: object
      properties:
        clerkUserId:
          type: string
        email:
          type: string
        firstName:
          type: string
        lastName:
          type: string
      required: [clerkUserId, email, firstName, lastName]

    # ── Companies ────────────────────────────────────────────────────────────
    Company:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        province:
          type: string
        city:
          type: string
        phone:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, name, province, city, createdAt]

    CreateCompanyBody:
      type: object
      properties:
        name:
          type: string
        province:
          type: string
        city:
          type: string
        phone:
          type: string
      required: [name, province, city]

    UpdateMemberRoleBody:
      type: object
      properties:
        role:
          $ref: "#/components/schemas/UserRole"
      required: [role]

    # ── Invitations ──────────────────────────────────────────────────────────
    Invitation:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
        token:
          type: string
        status:
          type: string
          enum: [pending, accepted, expired]
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        company:
          $ref: "#/components/schemas/Company"
          nullable: true
      required: [id, companyId, email, role, token, status, expiresAt, createdAt]

    CreateInvitationBody:
      type: object
      properties:
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
      required: [email, role]

    UpdateInvitationBody:
      type: object
      properties:
        email:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"

    # ── Projects ─────────────────────────────────────────────────────────────
    Project:
      type: object
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        address:
          type: string
        city:
          type: string
        province:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        startDate:
          type: string
          format: date
          nullable: true
        endDate:
          type: string
          format: date
          nullable: true
        budget:
          type: number
          nullable: true
        description:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, companyId, name, address, city, province, status, createdAt]

    ProjectStatus:
      type: string
      enum: [planning, active, on_hold, completed, cancelled]

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        province:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
        description:
          type: string
      required: [name, address, city, province]

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        address:
          type: string
        city:
          type: string
        province:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        startDate:
          type: string
          format: date
        endDate:
          type: string
          format: date
        budget:
          type: number
        description:
          type: string

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: integer
        projectName:
          type: string
        status:
          $ref: "#/components/schemas/ProjectStatus"
        totalBudget:
          type: number
          nullable: true
        totalSpent:
          type: number
        budgetUtilizationPercent:
          type: number
          nullable: true
        reportCount:
          type: integer
        openRFICount:
          type: integer
        closedRFICount:
          type: integer
        lastReportDate:
          type: string
          format: date
          nullable: true
      required: [projectId, projectName, status, totalSpent, reportCount, openRFICount, closedRFICount]

    # ── Daily Reports ─────────────────────────────────────────────────────────
    DailyReport:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        submittedByUserId:
          type: integer
        reportDate:
          type: string
          format: date
        weather:
          type: string
          nullable: true
        temperature:
          type: string
          nullable: true
        crewCount:
          type: integer
        workPerformed:
          type: string
        materialsUsed:
          type: string
          nullable: true
        equipment:
          type: string
          nullable: true
        issues:
          type: string
          nullable: true
        aiSummary:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        submittedBy:
          $ref: "#/components/schemas/User"
          nullable: true
      required: [id, projectId, submittedByUserId, reportDate, crewCount, workPerformed, createdAt]

    CreateDailyReportBody:
      type: object
      properties:
        reportDate:
          type: string
          format: date
        weather:
          type: string
        temperature:
          type: string
        crewCount:
          type: integer
        workPerformed:
          type: string
        materialsUsed:
          type: string
        equipment:
          type: string
        issues:
          type: string
        aiSummary:
          type: string
      required: [reportDate, crewCount, workPerformed]

    # ── Cost Analyses ─────────────────────────────────────────────────────────
    CostAnalysis:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        periodLabel:
          type: string
        labourCost:
          type: number
        materialsCost:
          type: number
        equipmentCost:
          type: number
        otherCost:
          type: number
        totalCost:
          type: number
        notes:
          type: string
          nullable: true
        aiAnalysis:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, projectId, periodLabel, labourCost, materialsCost, equipmentCost, otherCost, totalCost, createdAt]

    CreateCostAnalysisBody:
      type: object
      properties:
        periodLabel:
          type: string
        labourCost:
          type: number
        materialsCost:
          type: number
        equipmentCost:
          type: number
        otherCost:
          type: number
        notes:
          type: string
        aiAnalysis:
          type: string
      required: [periodLabel, labourCost, materialsCost, equipmentCost, otherCost]

    # ── RFIs ──────────────────────────────────────────────────────────────────
    RFI:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        rfiNumber:
          type: string
        subject:
          type: string
        description:
          type: string
        submittedByUserId:
          type: integer
        assignedToUserId:
          type: integer
          nullable: true
        status:
          $ref: "#/components/schemas/RFIStatus"
        priority:
          $ref: "#/components/schemas/RFIPriority"
        response:
          type: string
          nullable: true
        aiDraftResponse:
          type: string
          nullable: true
        dueDate:
          type: string
          format: date
          nullable: true
        closedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        submittedBy:
          $ref: "#/components/schemas/User"
          nullable: true
      required: [id, projectId, rfiNumber, subject, description, submittedByUserId, status, priority, createdAt]

    RFIStatus:
      type: string
      enum: [open, in_review, answered, closed]

    RFIPriority:
      type: string
      enum: [low, medium, high, urgent]

    CreateRFIBody:
      type: object
      properties:
        subject:
          type: string
        description:
          type: string
        assignedToUserId:
          type: integer
        priority:
          $ref: "#/components/schemas/RFIPriority"
        dueDate:
          type: string
          format: date
        aiDraftResponse:
          type: string
      required: [subject, description]

    UpdateRFIBody:
      type: object
      properties:
        status:
          $ref: "#/components/schemas/RFIStatus"
        response:
          type: string
        assignedToUserId:
          type: integer
        priority:
          $ref: "#/components/schemas/RFIPriority"
        dueDate:
          type: string
          format: date

    # ── AI Agents ─────────────────────────────────────────────────────────────
    AIGenerateDailyReportBody:
      type: object
      properties:
        projectName:
          type: string
        rawInput:
          type: string
          description: Raw notes or voice transcript to structure
        reportDate:
          type: string
          format: date
        crewCount:
          type: integer
      required: [projectName, rawInput, reportDate]

    AIGeneratedDailyReport:
      type: object
      properties:
        workPerformed:
          type: string
        materialsUsed:
          type: string
        equipment:
          type: string
        issues:
          type: string
        summary:
          type: string
      required: [workPerformed, summary]

    AIGenerateCostAnalysisBody:
      type: object
      properties:
        projectName:
          type: string
        labourCost:
          type: number
