name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Secrets scanning ──────────────────────────────────────────────────────
  secrets:
    name: Secrets scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Dependency audit ──────────────────────────────────────────────────────
  audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit for high/critical vulnerabilities
        # --audit-level=high would fail on the pnpm audit false-positive from
        # Vite's declared esbuild range (^0.27.0) even though pnpm.overrides
        # forces the resolved version to ^0.28.1.  Use critical for now; track
        # the Vite esbuild range upgrade and remove this note when resolved.
        run: pnpm audit --audit-level=critical

  # ── TypeScript typecheck ──────────────────────────────────────────────────
  typecheck:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck (all packages)
        run: pnpm typecheck

  # ── Migration validation ──────────────────────────────────────────────────
  migrations:
    name: Migration validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate migration files
        run: node scripts/validate-migrations.cjs

  # ── Unit tests ────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ci
          POSTGRES_PASSWORD: ci
          POSTGRES_DB: ci_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: "11"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enable pgvector extension
        run: psql postgresql://ci:ci@localhost:5432/ci_test?sslmode=disable -c "CREATE EXTENSION IF NOT EXISTS vector;"

      - name: Push database schema
        run: pnpm --filter @workspace/db push
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test?sslmode=disable

      - name: Run tests
        run: pnpm test
        env:
          # sslmode=disable: CI postgres service has no SSL
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci_test?sslmode=disable
          # Dummy values to satisfy import-time guards in lib/integrations-openai-ai-server
          AI_INTEGRATIONS_OPENAI_BASE_URL: http://localhost:11434/v1
          AI_INTEGRATIONS_OPENAI_API_KEY: dummy-key-for-ci
